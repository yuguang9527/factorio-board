<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factorio Board - LLM Agent Leaderboard</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --gold: #f0c000;
    --silver: #adb5bd;
    --bronze: #cd7f32;
    --green: #3fb950;
    --red: #f85149;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

  header { text-align: center; margin-bottom: 2.5rem; }
  header h1 { font-size: 2.2rem; font-weight: 700; margin-bottom: 0.3rem; }
  header h1 span { color: var(--accent); }
  header p { color: var(--text-dim); font-size: 1rem; }
  .badges { margin-top: 0.8rem; display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; }
  .badge {
    display: inline-block; padding: 0.2rem 0.6rem; border-radius: 12px;
    font-size: 0.75rem; font-weight: 600; border: 1px solid var(--border);
    color: var(--text-dim);
  }

  .stats-bar {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 1rem; margin-bottom: 2rem;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 1rem; text-align: center;
  }
  .stat-card .value { font-size: 1.8rem; font-weight: 700; color: var(--accent); }
  .stat-card .label { font-size: 0.8rem; color: var(--text-dim); margin-top: 0.2rem; }

  .table-wrap {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  thead { background: rgba(88,166,255,0.08); }
  th {
    padding: 0.75rem 1rem; text-align: left; font-size: 0.75rem;
    text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-dim);
    border-bottom: 1px solid var(--border); cursor: pointer; user-select: none;
  }
  th:hover { color: var(--accent); }
  th.sorted-asc::after { content: ' \u25B2'; font-size: 0.6rem; }
  th.sorted-desc::after { content: ' \u25BC'; font-size: 0.6rem; }
  td {
    padding: 0.7rem 1rem; border-bottom: 1px solid var(--border);
    font-size: 0.9rem; font-variant-numeric: tabular-nums;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover { background: rgba(88,166,255,0.04); }
  .rank { font-weight: 700; width: 3rem; text-align: center; }
  .rank-1 { color: var(--gold); }
  .rank-2 { color: var(--silver); }
  .rank-3 { color: var(--bronze); }
  .model-name { font-weight: 600; }
  .score { font-weight: 700; color: var(--green); }
  .dim { color: var(--text-dim); }
  .error-rate { color: var(--red); }
  .status { text-align: center; padding: 3rem; color: var(--text-dim); font-size: 0.9rem; }
  .updated { text-align: right; color: var(--text-dim); font-size: 0.75rem; margin-bottom: 0.5rem; }

  footer {
    text-align: center; margin-top: 2.5rem; padding-top: 1.5rem;
    border-top: 1px solid var(--border); color: var(--text-dim); font-size: 0.8rem;
  }
  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Factorio <span>Board</span></h1>
    <p>LLM Agent Benchmark &mdash; Who builds the best factory?</p>
    <div class="badges">
      <span class="badge">Weave Traces</span>
      <span class="badge">Multi-Model</span>
      <span class="badge">Open Data</span>
    </div>
  </header>

  <div class="stats-bar" id="stats-bar" style="display:none;">
    <div class="stat-card"><div class="value" id="stat-models">0</div><div class="label">Models</div></div>
    <div class="stat-card"><div class="value" id="stat-runs">0</div><div class="label">Trajectories</div></div>
    <div class="stat-card"><div class="value" id="stat-best">0</div><div class="label">Best Score</div></div>
    <div class="stat-card"><div class="value" id="stat-steps">0</div><div class="label">Avg Steps</div></div>
  </div>

  <div id="updated-time" class="updated"></div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="rank">#</th>
          <th data-col="model">Model</th>
          <th data-col="runs">Runs</th>
          <th data-col="best_score">Best Score</th>
          <th data-col="avg_score">Avg Score</th>
          <th data-col="avg_steps">Avg Steps</th>
          <th data-col="avg_tokens">Tokens/Run</th>
          <th data-col="avg_latency">Avg Latency</th>
          <th data-col="error_rate">Error Rate</th>
        </tr>
      </thead>
      <tbody id="leaderboard-body">
        <tr><td colspan="9" class="status">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <footer>
    Powered by <a href="https://wandb.ai">W&amp;B Weave</a> &middot;
    <a href="https://github.com/yuguang9527/factorio-board">GitHub</a>
  </footer>
</div>

<script>
let leaderboardData = [];
let currentSort = { col: 'best_score', dir: 'desc' };

// Load static results.json — no auth, no API keys
async function init() {
  try {
    const resp = await fetch('results.json?' + Date.now());
    if (!resp.ok) throw new Error('Failed to load results.json');
    const runs = await resp.json();

    if (!runs.length) {
      showStatus('No results yet. Run agent_loop.py to generate data.');
      return;
    }

    // Aggregate by model
    const byModel = {};
    for (const r of runs) {
      const m = r.model || 'unknown';
      if (!byModel[m]) byModel[m] = { scores: [], steps: [], tokens: [], latencies: [], errors: 0, total: 0 };
      const b = byModel[m];
      b.scores.push(r.final_score || 0);
      b.steps.push(r.total_steps || 0);
      b.tokens.push(r.total_tokens || 0);
      b.latencies.push(r.avg_latency_ms || 0);
      b.errors += r.error_steps || 0;
      b.total += r.total_steps || 0;
    }

    leaderboardData = Object.entries(byModel).map(([model, b]) => ({
      model,
      runs: b.scores.length,
      best_score: Math.max(...b.scores),
      avg_score: avg(b.scores),
      avg_steps: avg(b.steps),
      avg_tokens: avg(b.tokens),
      avg_latency: avg(b.latencies),
      error_rate: b.total > 0 ? b.errors / b.total : 0,
    }));

    // Show last updated
    const latest = runs.reduce((a, b) => (a.timestamp || '') > (b.timestamp || '') ? a : b);
    if (latest.timestamp) {
      document.getElementById('updated-time').textContent =
        'Last updated: ' + new Date(latest.timestamp).toLocaleString();
    }

    renderTable();
    renderStats();
  } catch (e) {
    showStatus('No results yet. Run agent_loop.py to generate data.');
  }
}

function avg(arr) {
  return arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : 0;
}

function renderTable() {
  const { col, dir } = currentSort;
  leaderboardData.sort((a, b) => {
    const va = a[col], vb = b[col];
    if (typeof va === 'string') return dir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
    return dir === 'asc' ? va - vb : vb - va;
  });

  const tbody = document.getElementById('leaderboard-body');
  tbody.innerHTML = leaderboardData.map((row, i) => {
    const rank = i + 1;
    const rc = rank <= 3 ? ` rank-${rank}` : '';
    return `<tr>
      <td class="rank${rc}">${rank}</td>
      <td class="model-name">${esc(row.model)}</td>
      <td>${row.runs}</td>
      <td class="score">${fmt(row.best_score)}</td>
      <td>${fmt(row.avg_score)}</td>
      <td>${fmt(row.avg_steps, 0)}</td>
      <td class="dim">${row.avg_tokens ? fmt(row.avg_tokens, 0) : '-'}</td>
      <td class="dim">${row.avg_latency ? Math.round(row.avg_latency) + 'ms' : '-'}</td>
      <td class="${row.error_rate > 0.1 ? 'error-rate' : 'dim'}">${(row.error_rate * 100).toFixed(1)}%</td>
    </tr>`;
  }).join('');

  document.querySelectorAll('th[data-col]').forEach(th => {
    th.classList.remove('sorted-asc', 'sorted-desc');
    if (th.dataset.col === col) th.classList.add(dir === 'asc' ? 'sorted-asc' : 'sorted-desc');
  });
}

function renderStats() {
  document.getElementById('stats-bar').style.display = 'grid';
  document.getElementById('stat-models').textContent = leaderboardData.length;
  document.getElementById('stat-runs').textContent = leaderboardData.reduce((a, r) => a + r.runs, 0);
  document.getElementById('stat-best').textContent = fmt(Math.max(...leaderboardData.map(r => r.best_score)));
  document.getElementById('stat-steps').textContent = fmt(avg(leaderboardData.map(r => r.avg_steps)), 0);
}

document.querySelectorAll('th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (currentSort.col === col) currentSort.dir = currentSort.dir === 'desc' ? 'asc' : 'desc';
    else currentSort = { col, dir: 'desc' };
    renderTable();
  });
});

function showStatus(msg) {
  document.getElementById('leaderboard-body').innerHTML =
    `<tr><td colspan="9" class="status">${esc(msg)}</td></tr>`;
}
function fmt(n, d = 1) {
  if (n == null || isNaN(n)) return '-';
  return Number(n).toLocaleString(undefined, { minimumFractionDigits: d, maximumFractionDigits: d });
}
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

init();
</script>
</body>
</html>
